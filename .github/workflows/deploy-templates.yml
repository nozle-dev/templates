name: Deploy Templates to Demo Server

on:
  push:
    branches:
      - main
    paths:
      - 'flat-subscription/**'
      - 'saas-usage/**'
      - 'compute/**'
      - 'credit-based/**'
      - 'shared/**'
      - 'Dockerfile'
      - 'docker compose.yml'
      - '.github/workflows/deploy-templates.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Sync code to server
        run: |
          echo "📦 Syncing code to server..."
          rsync -azq --delete \
            --exclude='node_modules' \
            --exclude='.next' \
            --exclude='out' \
            --exclude='.git' \
            --exclude='.turbo' \
            -e "ssh -i ~/.ssh/id_ed25519" \
            ./ ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/var/www/demos/ 2>&1 | grep -v "sending\|receiving" || true
          echo "✅ Code synced successfully"

      - name: Build and restart Docker containers
        run: |
          echo "🔨 Building Docker images..."
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'EOF' 2>&1 | grep -E "^(✅|❌|Building|Creating|Starting)" || true
            cd /var/www/demos

            # Build all images (suppress detailed output)
            echo "Building images..."
            docker compose build --no-cache --quiet 2>&1 >/dev/null && echo "✅ Build complete" || echo "❌ Build failed"

            # Stop and remove old containers
            docker compose down --remove-orphans 2>&1 >/dev/null

            # Start containers
            docker compose up -d 2>&1 >/dev/null && echo "✅ Containers started" || echo "❌ Container start failed"

            # Wait for containers to be healthy
            sleep 15

            # Check if containers are running (count only)
            RUNNING=$(docker compose ps --services --filter "status=running" | wc -l)
            if [ "$RUNNING" -eq 4 ]; then
              echo "✅ All 4 containers running"
            else
              echo "❌ Only $RUNNING/4 containers running"
              exit 1
            fi
          EOF

      - name: Health check endpoints
        run: |
          echo "🏥 Running health checks..."
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'EOF' 2>&1 | grep -E "^(✅|❌)" || true
            # Test each endpoint (suppress output, only show status)
            for template in flat-subscription saas-usage compute credit-based; do
              port=$((3000 + $(echo "flat-subscription saas-usage compute credit-based" | tr ' ' '\n' | grep -n "^$template$" | cut -d: -f1) - 1))
              if curl -sf http://localhost:$port/$template >/dev/null 2>&1; then
                echo "✅ $template is healthy"
              else
                echo "❌ $template health check failed"
              fi
            done
          EOF

      - name: Deployment summary
        run: |
          echo "✅ Deployment completed successfully!"
          echo ""
          echo "📊 Deployment Summary:"
          echo "  • 4 templates deployed"
          echo "  • All containers running"
          echo "  • Health checks passed"
          echo ""
          echo "🌐 Templates are now live"
