services:
  flat-subscription:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TEMPLATE_NAME: flat-subscription
        BASE_PATH: /flat-subscription
        PORT: 3002
        DEMO_MODE: "true"
        DEMO_USER_EMAIL: demo@nozle.app
        DEMO_USER_PASSWORD: Nozlepass@123
    container_name: nozle-demo-flat
    ports:
      - "3002:3002"
    environment:
      - DEMO_MODE=true
      - DEMO_USER_EMAIL=demo@nozle.app
      - DEMO_USER_PASSWORD=Nozlepass@123
      - DEMO_USER_NAME=Demo User
      - BASE_PATH=/flat-subscription
      - NEXT_PUBLIC_BASE_PATH=/flat-subscription
      - PORT=3002
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:3002/flat-subscription"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

