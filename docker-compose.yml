services:
  flat-subscription:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TEMPLATE_NAME: flat-subscription
        BASE_PATH: /flat-subscription
        PORT: 3000
    container_name: nozle-demo-flat
    ports:
      - "3000:3000"
    environment:
      - DEMO_MODE=true
      - BASE_PATH=/flat-subscription
      - PORT=3000
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/flat-subscription"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  saas-usage:
